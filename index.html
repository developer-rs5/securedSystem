<body>

      { id: 1, city: "Mumbai", title: "Delivery Rider Found Hours After Accident", date: "Mar 2025", desc: "A Swiggy delivery partner met with an accident in Andheri at 11 PM. No platform alert was triggered. His family found out 6 hours later when they called police.", tag: "INCIDENT" },
      { id: 2, city: "Delhi", title: "Zomato Partner Robbed, Platform Unreachable", date: "Jan 2025", desc: "A delivery executive was robbed at knifepoint in South Delhi. He had no emergency protocol. The platform's helpline put him on hold for 22 minutes.", tag: "ROBBERY" },
      { id: 3, city: "Bangalore", title: "Night-Shift Cab Driver Disappears for 14 Hours", date: "Feb 2025", desc: "An Ola driver went off-grid during a late-night pickup in Whitefield. His family had no tracking access. He was found at a hospital — had suffered a cardiac event alone.", tag: "MEDICAL" },

    const SEED_BLOGS = [
      {
        id: 1,
        slug: "invisible-workforce",
        tag: "SAFETY",
        title: "India's Invisible Workforce: Why Gig Workers Die Alone",
        date: "May 2025",
        readTime: "6 min read",
        author: "Secured Systems Editorial",
        body: `Every morning, 12 million Indians strap on a helmet, open an app, and disappear into the city. They carry your food. They drive you home. They deliver the package you forgot you ordered.

And when something goes wrong — an accident, a robbery, a medical emergency — they handle it alone.

There is no protocol. No alert. No platform-side response. Just a worker, a phone, and the hope that someone notices.

**The Numbers Don't Lie**

India reported over 400 worker deaths from workplace accidents in 2024 alone. These are the ones that got counted — formal sector workers in registered facilities. Gig workers, operating outside these systems, don't appear in the data at all.

The Ministry of Labour's statistics stop at factory gates. The delivery executive who collapsed on a highway in Pune, the cab driver who was carjacked outside Gurugram — they're statistical ghosts.

**Platforms Know. Platforms Don't Act.**

Every major gig platform has real-time GPS data on their workers. They know where each worker is, at every minute. They have the infrastructure to detect an anomaly — a worker stationary for too long, a route deviation, a sudden stop.

They choose not to build safety systems on top of this data because safety costs money. Liability costs more. So they've made a calculated decision: let workers self-manage risk.

**What Sentinel Changes**

Sentinel runs passively. Workers don't have to press a button or remember to check in. The system watches quietly — and only surfaces when something looks wrong.

A peer-based assistance mesh means the nearest verified gig worker gets a nudge when an alert triggers. No central call centre. No 22-minute holds. Real people, close by, who understand the job.

This is what infrastructure looks like when you build it for the people who actually need it — not for the quarterly report.`,
      },
      {
        id: 2,
        slug: "tier2-risk",
        tag: "RESEARCH",
        title: "Tier-2 Cities: Where Gig Worker Risk Is Highest and Visibility Lowest",
        date: "Apr 2025",
        readTime: "5 min read",
        author: "Secured Systems Editorial",
        body: `Kanpur. Lucknow. Patna. Coimbatore. These cities don't make the safety headlines. They should.

As quick commerce and food delivery platforms expand aggressively into India's tier-2 cities, they're replicating metro-level operations without metro-level infrastructure. The result is a gig workforce operating in cities with weaker emergency response, fewer hospitals per capita, and virtually no platform safety presence.

**The Expansion Playbook**

Platforms like Blinkit and Zepto reported a 120% surge in orders during the 2025 festive season, driven largely by tier-2 expansion. This is extraordinary growth — but it's worker growth without welfare growth.

In Mumbai, a delivery worker in distress is 15 minutes from a government hospital. In Kanpur, that number can triple. Response time in an emergency isn't just a statistic — it's survival.

**What the Data Shows**

Of India's 12 million gig workers, the metro-focused data dramatically underrepresents tier-2 reality. Bangalore has ~234,000 app-based gig workers. Delhi has ~225,000. Mumbai, ~133,000. These numbers are tracked, studied, cited.

Kanpur's gig workforce? No published estimate. No safety study. No platform disclosure.

Invisibility is the most dangerous condition a worker can be in.

**Sentinel's Tier-2 Pilot**

Kanpur is one of Sentinel's four pilot cities precisely because of this gap. The real validation of any safety system happens in the city where conditions are hardest — not where it's easiest to look good.

Our tier-2 data will become the evidence base for a category that currently has none.`,
      },
    ];

    const SENTINEL_METRICS = [
      { value: "200", label: "Downloads", icon: "↓" },
      { value: "4", label: "Cities Targeted", icon: "◎" },

      { value: "50", label: "Real-time Alerts Triggered", icon: "⚡" },
      { value: "<10 min", label: "Theoretical Response Time", icon: "⏱" },

      { city: "Mumbai", workers: "133,000+", status: "Active Pilot" },
      { city: "Delhi", workers: "225,000+", status: "Active Pilot" },
      { city: "Bangalore", workers: "234,000+", status: "Active Pilot" },
      { city: "Kanpur", workers: "Tier-2 Validation", status: "Active Pilot" },

    // ─── REUSABLE UI COMPONENTS ─────────────────────────────────────
    function Tag({ children, color = C.accent }) {
      return (
        <span style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: "10px",
          letterSpacing: "0.15em", textTransform: "uppercase",
          color, background: `${color}18`,
          border: `1px solid ${color}33`,
          padding: "3px 8px", borderRadius: "2px",
        }}>{children}</span>
      );
    }

    function Btn({ children, onClick, variant = "primary", small, style = {}, disabled }) {
      const base = {
        border: "none", borderRadius: "5px", cursor: disabled ? "not-allowed" : "pointer",
        fontFamily: "'IBM Plex Sans', sans-serif",
        fontWeight: 500, letterSpacing: "0.03em",
        transition: "all 0.15s",
        padding: small ? "7px 16px" : "11px 24px",
        fontSize: small ? "12px" : "13px",
        opacity: disabled ? 0.6 : 1,
        ...style,
      };
      if (variant === "primary") return <button disabled={disabled} onClick={onClick} style={{ ...base, background: `linear-gradient(135deg, ${C.accent}, #1D4ED8)`, color: C.white }}>{children}</button>;
      if (variant === "ghost") return <button disabled={disabled} onClick={onClick} style={{ ...base, background: "none", border: `1px solid ${C.borderHi}`, color: C.steelHi }}>{children}</button>;
      return <button disabled={disabled} onClick={onClick} style={base}>{children}</button>;
    }

    // ─── NAVIGATION ─────────────────────────────────────────────────
    function Nav({ page, setPage }) {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 30);
        window.addEventListener("scroll", fn);
        return () => window.removeEventListener("scroll", fn);
      }, []);
      return (
        <nav style={{
          position: "fixed", top: 0, left: 0, right: 0, zIndex: 200,
          background: scrolled ? "rgba(6,9,15,0.96)" : "transparent",
          backdropFilter: scrolled ? "blur(14px)" : "none",
          borderBottom: scrolled ? `1px solid ${C.border}` : "none",
          transition: "all 0.3s", padding: "0 48px",
          display: "flex", alignItems: "center", justifyContent: "space-between", height: "60px",
        }}>
          <button onClick={() => setPage("home")} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: "10px" }}>
            <div style={{ width: "30px", height: "30px", background: `linear-gradient(135deg, ${C.accent}, #1D4ED8)`, borderRadius: "5px", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M8 1.5L13 4.5V9C13 11.8 10.8 14.2 8 15C5.2 14.2 3 11.8 3 9V4.5L8 1.5Z" stroke="white" strokeWidth="1.2" fill="none"/>
                <circle cx="8" cy="9" r="1.8" fill="white"/>
              </svg>
            </div>
            <span style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "17px", fontWeight: 600, color: C.text, letterSpacing: "0.04em" }}>SecuredSystems<span style={{ color: C.accentBright, fontFamily: "'IBM Plex Mono', monospace", fontSize: "13px" }}>.in</span></span>
          </button>
          <div style={{ display: "flex", gap: "28px", alignItems: "center" }}>
            {[["home", "Awareness"], ["sentinel", "Sentinel"], ["blogs", "Blog"], ["about", "About"]].map(([p, label]) => (
              <button key={p} onClick={() => setPage(p)} style={{
                background: "none", border: "none", cursor: "pointer",
                fontFamily: "'IBM Plex Mono', monospace", fontSize: "11px",
                letterSpacing: "0.12em", textTransform: "uppercase",
                color: page === p ? C.accentBright : C.steel,
                borderBottom: page === p ? `1px solid ${C.accentBright}` : "1px solid transparent",
                paddingBottom: "2px", transition: "color 0.15s",
              }}>{label}</button>
            ))}
          </div>
        </nav>
      );
    }

    // ─── HOME PAGE ──────────────────────────────────────────────────

      return (
        <div style={{ paddingTop: "60px" }}>
          <div style={{
            minHeight: "92vh", display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center", textAlign: "center",
            padding: "80px 48px 60px", position: "relative", overflow: "hidden",

          }}>

            <h1 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "clamp(38px, 6.5vw, 78px)", fontWeight: 700, lineHeight: 1.08, color: C.text, maxWidth: "860px", marginBottom: "22px", letterSpacing: "-0.01em" }}>Millions Work.<br /><span style={{ color: C.accentBright }}>None Are Protected.</span></h1>
            <p style={{ fontSize: "17px", color: C.muted, maxWidth: "500px", lineHeight: 1.75, marginBottom: "40px" }}>India has 12 million gig workers. Platforms track their every move — but build zero safety infrastructure around them. We're here to fix that.</p>
            <div style={{ display: "flex", gap: "14px", flexWrap: "wrap", justifyContent: "center" }}>
              <Btn onClick={() => setPage("sentinel")}>See Sentinel →</Btn>
              <Btn variant="ghost" onClick={() => document.getElementById("awareness")?.scrollIntoView({ behavior: "smooth" })}>View the Crisis ↓</Btn>
            </div>
            <div style={{ display: "flex", marginTop: "72px", border: `1px solid ${C.border}`, borderRadius: "8px", background: C.surface, overflow: "hidden", flexWrap: "wrap" }}>
              {stats.slice(0, 4).map((s, i) => (
                <div key={s.id} style={{ padding: "18px 28px", textAlign: "center", borderRight: i < 3 ? `1px solid ${C.border}` : "none", minWidth: "140px" }}>
                  <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "24px", fontWeight: 700, color: C.accentBright }}>{s.value}</div>
                  <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "10px", color: C.dim, marginTop: "3px", letterSpacing: "0.05em" }}>{s.label.split("—")[0].trim()}</div>
                </div>
              ))}
            </div>
          </div>

          <section id="awareness" style={{ padding: "80px 48px", maxWidth: "1100px", margin: "0 auto" }}>
            <div style={{ marginBottom: "12px" }}><Tag>// Data</Tag></div>
            <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "clamp(26px, 4vw, 44px)", fontWeight: 700, marginBottom: "40px" }}>The Numbers That<br /><span style={{ color: C.accentBright }}>Don't Lie</span></h2>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: "14px" }}>
              {stats.map(s => (
                <div key={s.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: "8px", padding: "24px 22px", transition: "all 0.2s" }}>

                </div>
              ))}
            </div>
          </section>

          <section style={{ padding: "0 48px 80px", maxWidth: "1100px", margin: "0 auto" }}>
            <div><Tag color={C.danger}>// Documented Cases</Tag></div>
            <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "clamp(24px, 3.5vw, 38px)", fontWeight: 700, marginBottom: "32px" }}>Real Workers.<br /><span style={{ color: C.danger }}>Real Failures.</span></h2>
            <div style={{ display: "flex", flexDirection: "column", gap: "14px" }}>
              {cases.map(c => (
                <div key={c.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderLeft: `3px solid ${C.danger}`, borderRadius: "8px", padding: "22px 24px", display: "flex", gap: "20px", flexWrap: "wrap" }}>

          <section style={{ padding: "0 48px 80px", maxWidth: "1100px", margin: "0 auto" }}>
            <div><Tag color={C.amber}>// Press & Coverage</Tag></div>

                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "12px" }}><Tag color={C.amber}>{n.source}</Tag><span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "10px", color: C.dim }}>{n.date}</span></div>

                  <div style={{ fontSize: "12px", color: C.muted, lineHeight: 1.6 }}>{n.summary}</div>

          <section style={{ padding: "0 48px 80px", maxWidth: "1100px", margin: "0 auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: "32px", flexWrap: "wrap" }}>

            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: "14px" }}>

                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "14px" }}><Tag>{b.tag}</Tag><span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "10px", color: C.dim }}>{b.readTime}</span></div>
                  <h3 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "19px", fontWeight: 600, marginBottom: "10px" }}>{b.title}</h3>

                </div>
              ))}

          </section>

          <footer style={{ borderTop: `1px solid ${C.border}`, padding: "28px 48px", display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: "12px" }}>

      );

    // ─── BLOG LIST & SINGLE BLOG (unchanged but kept for completeness) ───
    function BlogsPage({ blogs, setPage, setActiveBlog }) {

          <h1 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "clamp(30px, 5vw, 52px)", fontWeight: 700, color: C.text, marginBottom: "12px", lineHeight: 1.1 }}>Intelligence &<br /><span style={{ color: C.accentBright }}>Awareness</span></h1>
          <p style={{ fontSize: "15px", color: C.muted, marginBottom: "48px", lineHeight: 1.7 }}>Research, field reports, and analysis on gig worker safety in India.</p>
          <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
            {blogs.map(b => (
              <div key={b.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: "8px", padding: "26px 28px", cursor: "pointer", display: "flex", gap: "24px", alignItems: "flex-start" }} onClick={() => { setActiveBlog(b); setPage("blog"); }}>
                <div style={{ minWidth: "80px" }}><Tag>{b.tag}</Tag><div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "10px", color: C.dim, marginTop: "8px" }}>{b.date}</div></div>
                <div style={{ flex: 1 }}><h3 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "20px", fontWeight: 600, marginBottom: "6px" }}>{b.title}</h3><div style={{ fontSize: "12px", color: C.muted }}>{b.readTime} · {b.author}</div></div>

    function BlogPage({ blog, setPage }) {
      const formatted = (blog.body || "").split("\n\n").map((para, i) => {
        if (para.startsWith("**") && para.endsWith("**")) {
          return <h3 key={i} style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "24px", fontWeight: 700, color: C.text, margin: "32px 0 14px" }}>{para.replace(/\*\*/g, "")}</h3>;
        }
        return <p key={i} style={{ fontSize: "16px", color: C.muted, lineHeight: 1.85, marginBottom: "18px" }}>{para}</p>;
      });
      return (
        <div style={{ paddingTop: "60px", maxWidth: "720px", margin: "0 auto", padding: "100px 48px 80px" }}>
          <button onClick={() => setPage("blogs")} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontFamily: "'IBM Plex Mono', monospace", fontSize: "11px", letterSpacing: "0.1em", marginBottom: "32px", display: "flex", alignItems: "center", gap: "6px" }}>← BACK TO BLOG</button>

    // ─── FORM MODAL with FORMSPREE (FORM SHAPE) INTEGRATION ─────────
    function JoinFormModal({ isOpen, onClose }) {
      const [formData, setFormData] = useState({
        name: "", email: "", address: "", city: "", phone: "", purpose: "Gig worker", feedback: ""
      });
      const [submitting, setSubmitting] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");

      // ✅ REPLACE THIS WITH YOUR ACTUAL FORMSPREE ENDPOINT
      // Get your free endpoint at https://formspree.io/ (create account → new form)
      // Example: "https://formspree.io/f/xqkrgplp"
      const FORMSPREE_ENDPOINT = "https://formspree.io/f/xqenrwkv";
      const isPlaceholder = FORMSPREE_ENDPOINT.includes("YOUR_FORM_ID_HERE");

      const required = ["name", "address", "city", "phone", "feedback"];
      const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });
      
      const handleSubmit = async (e) => {
        e.preventDefault();
        setErrorMsg("");

        if (isPlaceholder) {
          // setErrorMsg("⚠️ Form endpoint not configured. Please replace FORMSPREE_ENDPOINT with your Formspree form ID (see instructions in code). For demo, contact team@securedsystems.in");
          return;
        }

        for (let field of required) {
          if (!formData[field]?.trim()) {
            setErrorMsg(`${field.charAt(0).toUpperCase() + field.slice(1)} is required.`);
            return;
          }
        }
        if (formData.phone && !/^[6-9]\d{9}$|^\d{10}$/.test(formData.phone.trim())) {
          setErrorMsg("Enter a valid 10-digit phone number.");
          return;
        }
        setSubmitting(true);
        
        // Prepare payload for Formspree (accepts JSON, expects _replyto etc, but we send full object)
        const payload = {
          name: formData.name,
          email: formData.email,
          address: formData.address,
          city: formData.city,
          phone: formData.phone,
          purpose: formData.purpose,
          feedback: formData.feedback,
          _subject: `Sentinel Pilot Request from ${formData.name}`,
          _replyto: formData.email || "no-reply@securedsystems.in",
          timestamp: new Date().toISOString(),
          source: "sentinel_pilot_form"
        };

        try {
          const response = await fetch(FORMSPREE_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body: JSON.stringify(payload)
          });
          if (response.ok) {
            alert(`✓ Thank you ${formData.name}! Your pilot request has been recorded via Secured Systems secure form. The Sentinel team will reach out soon.`);
            setFormData({ name: "", email: "", address: "", city: "", phone: "", purpose: "Gig worker", feedback: "" });
            onClose();
          } else {
            const errorData = await response.json();
            throw new Error(errorData?.error || "Form submission failed");
          }
        } catch (err) {
          console.error(err);
          setErrorMsg("Submission failed. Please try again later or contact support@securedsystems.in");
        } finally {
          setSubmitting(false);
        }
      };
      
      if (!isOpen) return null;
      return (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.85)", backdropFilter: "blur(10px)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: "20px" }}>
          <div style={{ background: C.surface, border: `1px solid ${C.borderHi}`, borderRadius: "20px", maxWidth: "560px", width: "100%", maxHeight: "85vh", overflowY: "auto", animation: "fadeSlideIn 0.2s ease", boxShadow: "0 20px 35px -10px rgba(0,0,0,0.5)" }}>
            <div style={{ padding: "24px 28px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div><Tag color={C.accentBright}>// Join Sentinel Pilot (secure form)</Tag></div>
              <button onClick={onClose} style={{ background: "none", border: "none", fontSize: "24px", color: C.steel, cursor: "pointer" }}>✕</button>
            </div>
            <form onSubmit={handleSubmit} style={{ padding: "28px 28px 34px", display: "flex", flexDirection: "column", gap: "18px" }}>
              <div><label style={{ fontSize: "13px", fontWeight: 500, color: C.text, display: "block", marginBottom: "5px" }}>Full Name <span style={{ color: C.danger }}>*</span></label><input name="name" value={formData.name} onChange={handleChange} style={{ width: "100%", background: C.bg, border: `1px solid ${C.border}`, borderRadius: "8px", padding: "11px 14px", color: C.text, fontSize: "14px" }} /></div>
              <div><label style={{ fontSize: "13px", fontWeight: 500, color: C.text, display: "block", marginBottom: "5px" }}>Email (optional)</label><input type="email" name="email" value={formData.email} onChange={handleChange} style={{ width: "100%", background: C.bg, border: `1px solid ${C.border}`, borderRadius: "8px", padding: "11px 14px", color: C.text }} /></div>
              <div><label style={{ fontSize: "13px", fontWeight: 500, color: C.text, display: "block", marginBottom: "5px" }}>Address <span style={{ color: C.danger }}>*</span></label><input name="address" value={formData.address} onChange={handleChange} style={{ width: "100%", background: C.bg, border: `1px solid ${C.border}`, borderRadius: "8px", padding: "11px 14px", color: C.text }} /></div>
              <div><label style={{ fontSize: "13px", fontWeight: 500, color: C.text, display: "block", marginBottom: "5px" }}>City <span style={{ color: C.danger }}>*</span></label><input name="city" value={formData.city} onChange={handleChange} style={{ width: "100%", background: C.bg, border: `1px solid ${C.border}`, borderRadius: "8px", padding: "11px 14px", color: C.text }} /></div>
              <div><label style={{ fontSize: "13px", fontWeight: 500, color: C.text, display: "block", marginBottom: "5px" }}>Phone Number <span style={{ color: C.danger }}>*</span></label><input name="phone" value={formData.phone} onChange={handleChange} placeholder="10 digits" style={{ width: "100%", background: C.bg, border: `1px solid ${C.border}`, borderRadius: "8px", padding: "11px 14px", color: C.text }} /></div>
              <div><label style={{ fontSize: "13px", fontWeight: 500, color: C.text, marginBottom: "5px", display: "block" }}>Purpose of download <span style={{ color: C.danger }}>*</span></label>
                <select name="purpose" value={formData.purpose} onChange={handleChange} style={{ width: "100%", background: C.bg, border: `1px solid ${C.border}`, borderRadius: "8px", padding: "11px 14px", color: C.text }}>
                  <option>Investor</option><option>Student</option><option>Gig worker</option>
                </select>
              </div>
              <div><label style={{ fontSize: "13px", fontWeight: 500, color: C.text, display: "block", marginBottom: "5px" }}>Thoughts about the system / Feedback <span style={{ color: C.danger }}>*</span></label><textarea name="feedback" rows="3" value={formData.feedback} onChange={handleChange} style={{ width: "100%", background: C.bg, border: `1px solid ${C.border}`, borderRadius: "8px", padding: "11px 14px", color: C.text, resize: "vertical" }}></textarea></div>
              {errorMsg && <div style={{ background: "rgba(220,38,38,0.15)", borderLeft: `2px solid ${C.danger}`, padding: "8px 12px", fontSize: "12px", color: C.danger }}>{errorMsg}</div>}
              <Btn type="submit" variant="primary" style={{ width: "100%", marginTop: "6px" }} disabled={submitting}>{submitting ? "Submitting securely..." : "Request Pilot Access →"}</Btn>
              <p style={{ fontSize: "10px", color: C.dim, textAlign: "center" }}>🔒 Protected by Formspree. Your data is encrypted and shared only with Secured Systems. For a live endpoint, replace FORMSPREE_ENDPOINT.</p>
            </form>
          </div>
        </div>
      );
    }
